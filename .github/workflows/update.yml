name: Update Airspaces Daily

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Git Repository auschecken
        uses: actions/checkout@v4

      - name: Python vorbereiten
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Bibliotheken installieren
        run: |
          pip install requests lxml beautifulsoup4 shapely

      - name: Direkter Download der XML-Datei über DFS
        run: |
          echo "Lade Datei über wget herunter..."
          # wget tut so, als sei es ein echter Browser
          wget --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/120.0.0.0 Safari/537.36" -O aixm_data.xml "https://aip.dfs.de/datasets/scripts/getItem.php?amdt=9999&content=ED_Airspace_StrokedBorders_2026-06-11_2026-06-11_snapshot.xml"
          
          # Kurz checken ob die Datei erfolgreich geladen und nicht leer ist
          if [ -s aixm_data.xml ]; then
            echo "Download erfolgreich, Dateigröße okay."
            head -n 5 aixm_data.xml
          else
            echo "Fehler: Heruntergeladene Datei ist leer."
            exit 1
          fi

      - name: GeoJSON aus XML generieren
        run: |
          # Das Script braucht die Eingabedatei (aixm_data.xml, die wir im Schritt davor geladen haben)
          # Und muss in die Zieldatei schreiben, die wir danach an GitHub & Windy übergeben (edr_from_aixm.geojson)
          python convert_aixm_edr_to_geojson.py --input aixm_data.xml --output edr_from_aixm.geojson

      - name: Neue GeoJSON pushen
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add edr_from_aixm.geojson
          git commit -m "Automatisches Luftraum Update (DFS)" || echo "Keine Änderungen vorhanden"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
